apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces-dev
  namespace: argocd

spec:
  project: default
  source:
    repoURL: https://github.com/Heahaidu/multi-stages-docker-build-springboot
    path: k8s/shared/namespaces
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    syncOptions:
    - CreateNamespace=true

    automated:
      selfHeal: true
      prune: true