apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-application
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Heahaidu/multi-stages-docker-build-springboot
    targetRevision: main
    path: k8s/manifest/backend/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  
  syncPolicy:
    syncOptions:
    - CreateNamespace=true

    automated:
      selfHeal: true
      prune: true