apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec: 
  replicas: 1
  template:
    spec:
      containers:
        - name: backend
          image: heahaidu/springboot-health-bootstrap
          envFrom:
            - configMapRef:
                name: backend-configmap
          resources:
            requests:
              cpu: 200m
              memory: 256Mi